<section id="products" class="py-5">
  <div class="container">
    <!-- Title -->
    <h2 class="text-center fw-semibold mb-3">Products</h2>

    <!-- Category Filter -->
    <div class="d-flex justify-content-center mb-4">
      <select
        class="form-select w-auto rounded-pill px-4 shadow-sm border-0"
        [(ngModel)]="selectedCategory"
        (change)="filter()"
      >
        <option selected value="all">All Categories</option>
        <option value="sport">Sport</option>
        <option value="classic">Classic</option>
        <option value="luxury">Luxury</option>
      </select>
    </div>

    <div class="row g-4">
      @for (product of filteredArray(); track $index) {
        <div class="col-12 col-sm-6 col-lg-3">
          <div class="card h-100 product-card shadow-sm">
            <div class="card-img-wrap">
              <img
                appScaleElement
                [src]="product.image"
                class="card-img-top"
                alt="{{ product.name }}"
                style="height: 180px; object-fit: cover"
              />
            </div>

            <div class="card-body product-body text-center d-flex flex-column">
              <span class="badge px-3 py-2 rounded-pill fw-medium text-dark bg-light border align-self-center">
                {{ product.category }}
              </span>

              <h5 appHighlight class="card-title mb-2 mt-2">{{ product.name }}</h5>

              <p class="product-desc text-muted small text-start px-1 mb-2">{{ product.description  | shortenDesc :10 }}</p>

              <p class="small text-secondary mb-2">
                Qty:
                <span class="fw-semibold text-body">{{ product.quantity }}</span>
              </p>

              <div class="product-rating small fw-semibold rounded-pill py-1 px-3 align-self-center mb-2">
                {{ product.rating | star: 5 }}
              </div>

              <p class="fw-bold rounded-pill mb-2" [class]=" product.price <= 100
                    ? 'bg-success-subtle text-success'
                    : 'bg-danger-subtle text-danger' ">
                ${{ product.price }}
              </p>

              <span
                class="badge px-3 py-2 rounded-pill fw-medium mb-3"
                [class]="
                  product.inStock
                    ? 'bg-success-subtle text-success'
                    : 'bg-danger-subtle text-danger'
                "
              >
                {{ product.inStock ? 'In Stock' : 'Out of Stock' }}
              </span>

              <div class="d-flex flex-column flex-sm-row product-actions mt-auto">
                <button
                  type="button"
                  class="btn btn-primary flex-grow-1"
                  (click)="addToCart(product.name)"
                  [disabled]="!product.inStock"
                >
                  Add to Cart
                </button>
                <a
                  class="btn btn-outline-secondary flex-grow-1"
                  [routerLink]="['/products', product.id]"
                >
                  Show details
                </a>
              </div>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
