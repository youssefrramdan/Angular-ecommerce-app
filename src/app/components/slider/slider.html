<div
  id="heroCarousel"
  class="carousel slide carousel-fade"
  data-bs-ride="carousel"
  data-bs-interval="5000"
>
  <div class="carousel-indicators bottom-0 mb-3">
    <button
      type="button"
      data-bs-target="#heroCarousel"
      data-bs-slide-to="0"
      class="active rounded-pill"
      aria-current="true"
      aria-label="Slide 1"
    ></button>
    <button
      type="button"
      data-bs-target="#heroCarousel"
      data-bs-slide-to="1"
      class="rounded-pill"
      aria-label="Slide 2"
    ></button>
    <button
      type="button"
      data-bs-target="#heroCarousel"
      data-bs-slide-to="2"
      class="rounded-pill"
      aria-label="Slide 3"
    ></button>
  </div>
  <div class="carousel-inner">
    <div class="carousel-item active">
      <div class="ratio ratio-21x9 bg-body-secondary">
        <img
          src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1600&h=680&fit=crop"
          class="d-block w-100 h-100 object-fit-cover"
          alt="Shopping bags and sale"
        />
      </div>
      <div class="carousel-caption start-0 end-0 bottom-0 p-3 p-md-4 text-center d-flex flex-column align-items-center justify-content-end">
        <div class="d-inline-block rounded-3 bg-dark bg-opacity-50 text-white px-3 py-2 py-md-3 px-md-4 mb-2 mb-md-3">
          <h2 class="mb-0 fw-medium fs-5 fs-md-4">Special offers</h2>
          <p class="d-none d-md-block small text-white-50 mb-0 mt-1">Deals you do not want to miss</p>
        </div>
        <a class="btn btn-primary btn-sm mb-0" href="#products">Shop now</a>
      </div>
    </div>
    <div class="carousel-item">
      <div class="ratio ratio-21x9 bg-body-secondary">
        <img
          src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1600&h=680&fit=crop"
          class="d-block w-100 h-100 object-fit-cover"
          alt="Clothing store interior"
        />
      </div>
      <div class="carousel-caption start-0 end-0 bottom-0 p-3 p-md-4 text-center d-flex flex-column align-items-center justify-content-end">
        <div class="d-inline-block rounded-3 bg-dark bg-opacity-50 text-white px-3 py-2 py-md-3 px-md-4 mb-2 mb-md-3">
          <h2 class="mb-0 fw-medium fs-5 fs-md-4">New collection</h2>
          <p class="d-none d-md-block small text-white-50 mb-0 mt-1">Fresh styles for the season</p>
        </div>
        <a class="btn btn-primary btn-sm mb-0" href="#products">Shop now</a>
      </div>
    </div>
    <div class="carousel-item">
      <div class="ratio ratio-21x9 bg-body-secondary">
        <img
          src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=1600&h=680&fit=crop"
          class="d-block w-100 h-100 object-fit-cover"
          alt="Watches and accessories"
        />
      </div>
      <div class="carousel-caption start-0 end-0 bottom-0 p-3 p-md-4 text-center d-flex flex-column align-items-center justify-content-end">
        <div class="d-inline-block rounded-3 bg-dark bg-opacity-50 text-white px-3 py-2 py-md-3 px-md-4 mb-2 mb-md-3">
          <h2 class="mb-0 fw-medium fs-5 fs-md-4">Top picks</h2>
          <p class="d-none d-md-block small text-white-50 mb-0 mt-1">Hand‑picked for your cart</p>
        </div>
        <a class="btn btn-primary btn-sm mb-0" href="#products">Shop now</a>
      </div>
    </div>
  </div>
  <button
    class="carousel-control-prev w-auto"
    type="button"
    data-bs-target="#heroCarousel"
    data-bs-slide="prev"
    aria-label="Previous slide"
  >
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
  </button>
  <button
    class="carousel-control-next w-auto"
    type="button"
    data-bs-target="#heroCarousel"
    data-bs-slide="next"
    aria-label="Next slide"
  >
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
  </button>
</div>
